<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Simplicity Life</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#2346d5",
                    "primary-container": "#4361ee",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#f4f2ff",
                    "primary-fixed": "#dee1ff",
                    "primary-fixed-dim": "#bac3ff",
                    "on-primary-fixed": "#001159",
                    "on-primary-fixed-variant": "#0031c4",
                    secondary: "#575e72",
                    "secondary-container": "#dbe2fa",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#5d6478",
                    "on-secondary-fixed": "#141b2c",
                    "on-secondary-fixed-variant": "#3f4759",
                    tertiary: "#005f76",
                    "tertiary-container": "#007995",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#e4f6ff",
                    "background": "#f8f9fa",
                    "on-background": "#191c1d",
                    surface: "#f8f9fa",
                    "surface-bright": "#f8f9fa",
                    "surface-dim": "#d9dadb",
                    "surface-container": "#edeeef",
                    "surface-container-low": "#f3f4f5",
                    "surface-container-high": "#e7e8e9",
                    "surface-container-highest": "#e1e3e4",
                    "on-surface": "#191c1d",
                    "on-surface-variant": "#444655",
                    "surface-variant": "#e1e3e4",
                    outline: "#747686",
                    "outline-variant": "#c4c5d7",
                    error: "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-error": "#ffffff",
                    "on-error-container": "#93000a",
                    "inverse-surface": "#2e3132",
                    "inverse-primary": "#bac3ff",
                    "inverse-on-surface": "#f0f1f2",
                },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                spacing: { "xs": "4px", "sm": "8px", "md": "16px", "lg": "24px", "xl": "32px", "margin": "24px", "gutter": "16px", "base": "8px" },
                fontFamily: { "body-sm": ["Inter"], "label-md": ["Inter"], "h1": ["Inter"], "label-sm": ["Inter"], "h3": ["Inter"], "h2": ["Inter"], "body-md": ["Inter"], "body-lg": ["Inter"] },
                fontSize: {
                    "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                    "label-md": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                    "h1": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "label-sm": ["11px", { "lineHeight": "1.2", "fontWeight": "500" }],
                    "h3": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                    "h2": ["32px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                    "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]
                }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 24px); }
    body { min-height: max(884px, 100dvh); }

    /* Dark mode overrides */
    .dark { color-scheme: dark; }
    .dark body { background-color: #1a1c1e; color: #e3e3e4; }
    .dark .bg-surface, .dark .bg-background { background-color: #1a1c1e; }
    .dark .bg-surface-container { background-color: #242628; }
    .dark .bg-surface-container-low { background-color: #1e2022; }
    .dark .bg-surface-container-high { background-color: #2e3032; }
    .dark .bg-surface-container-highest { background-color: #36383a; }
    .dark .bg-surface-container-lowest { background-color: #121416; }
    .dark .bg-surface-bright { background-color: #2e3032; }
    .dark .bg-surface-dim { background-color: #121416; }
    .dark .bg-surface-variant { background-color: #36383a; }
    .dark .bg-white { background-color: #1a1c1e; }
    .dark .text-on-surface, .dark .text-on-background { color: #e3e3e4; }
    .dark .text-on-surface-variant { color: #c4c5d7; }
    .dark .text-on-secondary-container { color: #dbe2fa; }
    .dark .text-on-tertiary-container { color: #b7eaff; }
    .dark .border-outline-variant { border-color: #444655; }
    .dark .border-outline-variant\/30 { border-color: rgba(68,70,85,0.3); }
    .dark .border-outline-variant\/50 { border-color: rgba(68,70,85,0.5); }
    .dark .border-outline-variant\/20 { border-color: rgba(68,70,85,0.2); }
    .dark .border-slate-100 { border-color: #2e3032; }
    .dark .bg-secondary-container { background-color: #3f4759; }
    .dark .bg-tertiary-container { background-color: #004e61; }
    .dark .bg-primary-fixed\/10 { background-color: rgba(222,225,255,0.1); }
    .dark .bg-primary-fixed\/30 { background-color: rgba(222,225,255,0.2); }
    .dark .bg-surface-container-low\/50 { background-color: rgba(30,32,34,0.5); }
    .dark .bg-primary\/10 { background-color: rgba(35,70,213,0.2); }
    .dark .divide-outline-variant\/30 > * { border-color: rgba(68,70,85,0.3); }
    .dark .shadow-\[0_4px_20px_rgba\(0\,0\,0\,0\.02\)\] { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .dark .hover\:bg-surface-container-low:hover { background-color: #1e2022; }
    .dark .hover\:bg-surface-container-high:hover { background-color: #36383a; }
    .dark .hover\:bg-surface-container-highest:hover { background-color: #3e4042; }
    .dark .hover\:bg-surface-variant:hover { background-color: #36383a; }
    .dark .hover\:bg-error-container\/20:hover { background-color: rgba(255,218,214,0.15); }
    .dark .hover\:bg-surface-container\/50:hover { background-color: rgba(36,38,40,0.5); }
    .dark .hover\:bg-primary\/10:hover { background-color: rgba(35,70,213,0.3); }
    .dark .hover\:bg-primary\/20:hover { background-color: rgba(35,70,213,0.4); }
    .dark .hover\:shadow-\[0_4px_20px_rgba\(0\,0\,0\,0\.05\)\]:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .dark .hover\:shadow-\[0_8px_24px_rgba\(0\,0\,0\,0\.04\)\]:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .dark .hover\:shadow-\[0_8px_30px_rgba\(67\,97\,238\,0\.05\)\]:hover { box-shadow: 0 8px 30px rgba(67,97,238,0.15); }
    .dark .hover\:shadow-\[0_12px_40px_rgba\(67\,97\,238\,0\.1\)\]:hover { box-shadow: 0 12px 40px rgba(67,97,238,0.2); }
    .dark .text-slate-400 { color: #8a8d9e; }
    .dark .bg-white\/90 { background-color: rgba(26,28,30,0.9); }
    .dark .bg-slate-900\/90 { background-color: rgba(15,17,19,0.9); }
    .dark .border-slate-100 { border-color: #2e3032; }
    .dark .border-slate-800 { border-color: #2e3032; }
    .dark .bg-slate-950 { background-color: #0f1113; }
    .dark .text-slate-900 { color: #e3e3e4; }
</style>
</head>
<body class="bg-surface text-on-surface font-body-md text-body-md min-h-screen flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed pb-24">
{% block content %}{% endblock %}
<nav class="fixed bottom-0 left-0 right-0 flex justify-around items-center h-20 pb-safe px-4 w-full z-50 bg-white/90 backdrop-blur-lg border-t border-slate-100 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] text-[11px] font-medium tracking-wide uppercase">
    <a href="/" class="flex flex-col items-center justify-center hover:text-primary active:scale-90 transition-all duration-200 ease-out w-16 gap-1 no-underline {{ 'text-primary font-bold' if active_page == 'home' else 'text-slate-400' }}">
        <span class="material-symbols-outlined" {% if active_page == 'home' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>calendar_today</span>
        <span data-i18n="nav.home">Home</span>
    </a>
    <a href="/add" class="flex flex-col items-center justify-center hover:text-primary active:scale-90 transition-all duration-200 ease-out w-16 gap-1 no-underline {{ 'text-primary font-bold' if active_page == 'add' else 'text-slate-400' }}">
        <span class="material-symbols-outlined text-3xl mb-1 text-primary" {% if active_page == 'add' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>add_circle</span>
        {% if active_page == 'add' %}
        <span class="absolute -bottom-1 text-[9px]" data-i18n="nav.ai_add">AI Add</span>
        {% else %}
        <span class="-mt-1" data-i18n="nav.ai_add">AI Add</span>
        {% endif %}
    </a>
    <a href="/profile" class="flex flex-col items-center justify-center hover:text-primary active:scale-90 transition-all duration-200 ease-out w-16 gap-1 no-underline {{ 'text-primary font-bold' if active_page == 'profile' else 'text-slate-400' }}">
        <span class="material-symbols-outlined" {% if active_page == 'profile' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>person</span>
        <span data-i18n="nav.profile">Profile</span>
    </a>
</nav>
{% block scripts %}{% endblock %}
</body>
</html>
